preset: okf-site

site:
  title: sorane
  description: OKF-native static site generator
  base_url: https://sorane.dev
  lang: ja
  license: MIT
  license_page: license.html
  copyright_since: 2023
  copyright_holder: Masanori Kusunoki
  contact:
    page: contact.html
  hosting:
    provider: cloudflare
    cloudflare:
      pages_project: sorane
      zone_name: sorane.dev
      web_analytics: true

build:
  content_dir: content
  out_dir: dist
  permalink: "{{slug}}.html"
  static_dir: static
  diagrams:
    enabled: true
    d2:
      enabled: true
  blog:
    archives: true
    tags: false
    featured_mode: off
    index_archive_limit: 5

docs:
  nav:
    - section: はじめに
    - getting-started.html
    - features.html
    - ai-onboarding.html
    - section: リファレンス
    - cli.html
    - configuration.html
    - diagrams.html
    - section: OKF・オープンデータ
    - okf-profile.html
    - open-data-harvesting.html
    - ai-disclosure.html
    - section: 運用
    - contact.html
    - deployment.html
    - releases.html
    - supply-chain.html
    - license.html

search:
  index: .sorane/index.db

fonts:
  enabled: false

kototoi:
  endpoint: https://ask.sorane.dev
  site_id: be0d228a-c582-4220-85c3-fd887e9e68fd
  form:
    title: お問い合わせ
    intro: ご質問・ご要望は下記フォームからお送りください。
    submit_label: 送信する
    fields:
      - id: name
        label: 氏名
        type: text
        required: true
        max_length: 200
      - id: affiliation
        label: 所属
        type: text
        required: false
        max_length: 200
      - id: body
        label: お問い合わせ内容
        type: textarea
        required: true
        max_length: 8000