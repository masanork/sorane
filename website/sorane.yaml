site:
  title: sorane
  description: OKF-native static site generator
  base_url: https://ssg.sorane.dev
  lang: ja

build:
  content_dir: content
  out_dir: dist
  permalink: "{{slug}}.html"
  static_dir: static
  blog:
    archives: false
    tags: false
    featured_mode: off

docs:
  nav:
    - getting-started.html
    - cli.html
    - configuration.html
    - okf-profile.html
    - deployment.html
    - releases.html

search:
  index: .sorane/index.db

fonts:
  enabled: false