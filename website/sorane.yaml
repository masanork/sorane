preset: okf-site

site:
  title: sorane
  description: OKF-native static site generator
  base_url: https://sorane.dev
  lang: ja
  hosting:
    provider: cloudflare
    cloudflare:
      pages_project: sorane
      zone_name: sorane.dev
      web_analytics: true

build:
  content_dir: content
  out_dir: dist
  permalink: "{{slug}}.html"
  static_dir: static
  diagrams:
    d2:
      enabled: true
  blog:
    archives: false
    tags: false
    featured_mode: off

docs:
  nav:
    - features.html
    - getting-started.html
    - ai-onboarding.html
    - cli.html
    - configuration.html
    - diagrams.html
    - ai-disclosure.html
    - okf-profile.html
    - deployment.html
    - releases.html
    - supply-chain.html

search:
  index: .sorane/index.db

fonts:
  enabled: false