preset: okf-site

site:
  title: sorane
  description: OKF-native static site generator
  base_url: https://sorane.dev
  lang: ja
  license: MIT
  license_page: license.html
  copyright_since: 2023
  copyright_holder: Masanori Kusunoki
  hosting:
    provider: cloudflare
    cloudflare:
      pages_project: sorane
      zone_name: sorane.dev
      web_analytics: true

build:
  content_dir: content
  out_dir: dist
  permalink: "{{slug}}.html"
  static_dir: static
  diagrams:
    d2:
      enabled: true
  blog:
    archives: true
    tags: false
    featured_mode: off
    index_archive_limit: 5

docs:
  nav:
    - section: はじめに
    - getting-started.html
    - features.html
    - ai-onboarding.html
    - section: リファレンス
    - cli.html
    - configuration.html
    - diagrams.html
    - section: OKF・オープンデータ
    - okf-profile.html
    - open-data-harvesting.html
    - ai-disclosure.html
    - section: 運用
    - deployment.html
    - releases.html
    - supply-chain.html
    - license.html

search:
  index: .sorane/index.db

fonts:
  enabled: false