name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "packages/**"
      - "templates/**"
      - "profile/**"
      - "scripts/supply-chain-status.ts"
      - "cbom.json"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: sorane-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install d2 CLI
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s -- --version v0.7.1 --prefix "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Update supply chain status
        run: npm run supply-chain:status

      - name: Build search index
        run: node packages/cli/src/main.ts index --cwd website --force

      - name: Build docs site
        run: node packages/cli/src/main.ts build --cwd website --clean

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name sorane