name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "packages/**"
      - "templates/**"
      - "profile/**"
      - "scripts/supply-chain-status.ts"
      - "cbom.json"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: sorane-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install d2 CLI
        run: |
          D2_VERSION=v0.7.1
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/d2.tar.gz \
            "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/d2.tar.gz -C /tmp
          install -m 0755 "/tmp/d2-${D2_VERSION}/bin/d2" "$HOME/.local/bin/d2"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Update supply chain status
        run: npm run supply-chain:status

      - name: Build search index
        run: node packages/cli/src/main.ts index --cwd website --force

      - name: Build docs site
        run: node packages/cli/src/main.ts build --cwd website --clean

      - name: Emit kototoi embed assets
        run: node website/scripts/emit-kototoi.mjs

      - name: Patch contact page for kototoi
        run: node website/scripts/patch-contact.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name sorane