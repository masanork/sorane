name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cbom-check:
    name: cbom drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "23"
      - run: npm run cbom-check

  release-workflow-lint:
    name: release.yml lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"
      - name: actionlint (release.yml)
        run: ./actionlint -color .github/workflows/release.yml

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "23"
      - run: npm ci
      - run: npm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage gate
        run: npm run test:coverage

      - name: LCOV report
        run: npm run test:coverage:lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Playwright E2E
        run: npm run test:e2e

  c2pa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install c2patool
        run: |
          C2PA_VER=0.26.67
          curl -sL "https://github.com/contentauth/c2pa-rs/releases/download/c2patool-v${C2PA_VER}/c2patool-v${C2PA_VER}-x86_64-unknown-linux-gnu.tgz" | tar xz
          sudo mv "c2patool-v${C2PA_VER}-x86_64-unknown-linux-gnu/c2patool" /usr/local/bin/c2patool
          c2patool --version

      - name: C2PA unit + integration tests
        run: node --test tests/c2pa-pass.test.ts tests/static-assets.test.ts tests/asset-provenance.test.ts

  image-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install ExifTool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: IPTC XMP unit + integration tests
        run: npm run test:image-metadata