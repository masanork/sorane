name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cbom-check:
    name: cbom drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "23"
      - run: npm run cbom-check

  release-workflow-lint:
    name: release.yml lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"
      - name: actionlint (release.yml)
        run: ./actionlint -color .github/workflows/release.yml

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "23"
      - run: npm ci
      - run: npm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage gate
        run: npm run test:coverage

      - name: LCOV report
        run: npm run test:coverage:lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  project-stats:
    name: project stats
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Download coverage LCOV
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: Collect stats snapshot
        run: |
          mkdir -p stats
          node scripts/project-stats.ts --json --coverage coverage/lcov.info > stats/latest.json

      - name: Update stats history and trend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          node scripts/stats-history.ts append stats/latest.json stats/history.jsonl
          node scripts/stats-history.ts trend stats/history.jsonl stats/trend.md

      - name: Upload stats artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-stats
          path: |
            stats/latest.json
            stats/history.jsonl
            stats/trend.md
          if-no-files-found: warn

      - name: Commit stats history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/history.jsonl stats/trend.md
          if git diff --staged --quiet; then
            echo "No stats changes to commit"
            exit 0
          fi
          git commit -m "chore(stats): update project stats history [skip ci]"
          git push

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Mermaid build tests (mmdc)
        run: |
          export PUPPETEER_EXECUTABLE_PATH="$(node -e "const {chromium}=require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          node --test tests/mermaid-build.test.ts tests/build-mermaid-build.test.ts

      - name: Playwright E2E
        run: npm run test:e2e

  c2pa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install c2patool
        run: bash scripts/install-c2patool.sh

      - name: C2PA unit + integration tests
        run: node --test tests/c2pa-pass.test.ts tests/static-assets.test.ts tests/asset-provenance.test.ts

  astro-ts-fallback:
    name: Astro TypeScript fallback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript fallback guard (no native CLI build)
        run: node --test tests/astro-backend-ts-fallback.test.ts

  astro:
    name: Astro integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm ci

      - name: Install astro-minimal dependencies
        working-directory: examples/astro-minimal
        run: npm ci --no-audit --no-fund

      - name: Build sorane-astro-backend CLI
        run: cargo build --manifest-path rust/sorane-astro-backend/Cargo.toml

      - name: Fetch search model (hybrid parity)
        run: npm run fetch-model

      - name: Astro unit + smoke tests
        run: node --test tests/astro-backend-contract.test.ts tests/astro-backend-parity.test.ts tests/astro-backend-native-parity.test.ts tests/astro-backend-validation-parity.test.ts tests/astro-backend-cli.test.ts tests/astro-backend-ts.test.ts tests/astro-route-loader.test.ts tests/astro-integration.test.ts tests/astro-smoke.test.ts

  image-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        # IPTC tests do not need onnxruntime postinstall (avoids flaky NuGet downloads).
        run: npm ci --ignore-scripts

      - name: Install ExifTool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: IPTC XMP unit + integration tests
        run: npm run test:image-metadata